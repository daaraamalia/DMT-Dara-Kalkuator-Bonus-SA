<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Bonus SA</title>

<style>
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:linear-gradient(135deg,#8e0e00,#1f1c18);
  padding:20px;
  min-height:100vh;
}

.card{
  max-width:520px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:14px;
  box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h2, h3{ text-align:center; color:#c62828; }

label{ font-weight:600; margin-top:12px; display:block; font-size:14px; }

input, select{
  width:100%;
  padding:11px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #ccc;
}

.grid-2 {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  margin-top:20px;
  background:linear-gradient(135deg,#c62828,#8e0000);
  color:white;
  border:none;
  border-radius:10px;
  font-size:17px;
  padding:15px;
  font-weight:bold;
  cursor:pointer;
  width:100%;
}

.result{
  margin-top:25px;
  padding:18px;
  border-radius:12px;
  border-left:6px solid #c62828;
  background:#f9f9f9;
  display:none;
}

.badge{ padding:4px 10px; border-radius:20px; font-size:12px; color:white; }
.badge-Red{background:#c62828}
.badge-Yellow{background:#f9a825;color:#000}
.badge-Green{background:#2e7d32}
.badge-Black{background:#263238}
.badge-Platinum{background:#6a1b9a}

.progress{ background:#ddd; border-radius:20px; height:10px; margin:10px 0; }
.bar{ height:100%; background:#c62828; }

.detail-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.sub-box {
  background:#f0f0f0;
  padding:10px;
  border-radius:8px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="card">
<h2>Kalkulator Bonus SA</h2>

<div class="grid-2">
<div>
<label>Level IS</label>
<select id="is">
<option value="138000">IS 1</option>
<option value="158000">IS 2</option>
<option value="178000">IS 3</option>
<option value="198000">IS 4</option>
</select>
</div>

<div>
<label>Hari</label>
<input type="number" id="hari">
</div>
</div>

<label>Vintage</label>
<select id="vintage">
<option value="0">M0</option>
<option value="10000000">M1</option>
<option value="25000000">M2</option>
<option value="45000000">M3</option>
<option value="200000000">M72+</option>
</select>

<label>Total Volume</label>
<input type="number" id="volume">

<hr>

<h3>NOS</h3>
<div class="grid-2">
<input type="number" id="FNC" placeholder="FEL NC">
<input type="number" id="FRO" placeholder="FEL RO">
<input type="number" id="NNC" placeholder="Non NC">
<input type="number" id="NRO" placeholder="Non RO">
</div>

<h3>Premi</h3>
<input type="number" id="vP" placeholder="VAS">
<input type="number" id="sP" placeholder="SAI">

<label>Potongan NL</label>
<select id="nl">
<option value="0">0%</option>
<option value="0.1">10%</option>
<option value="0.2">20%</option>
<option value="0.3">30%</option>
</select>

<button onclick="hitungSemua()">HITUNG BONUS</button>

<div id="hasil" class="result"></div>

</div>

<script>
function hitungSemua(){

const hari = +document.getElementById("hari").value || 0;
const vol = +document.getElementById("volume").value || 0;
const vPremi = +document.getElementById("vP").value || 0;
const sPremi = +document.getElementById("sP").value || 0;
const potRate = +document.getElementById("nl").value;
const targetMinimal = +document.getElementById("vintage").value;

if(!hari) return alert("Isi hari dulu");

const gDasar = (+document.getElementById("is").value) * hari;

let isZonk = vol < targetMinimal;

let bNOS = (
(+document.getElementById("FNC").value * 100000 || 0) +
(+document.getElementById("FRO").value * 50000 || 0) +
(+document.getElementById("NNC").value * 80000 || 0) +
(+document.getElementById("NRO").value * 40000 || 0)
);

let bVAS = vPremi * 0.04;
let bSAI = sPremi * 0.07;

const gross = bNOS + bVAS + bSAI;
const pot = gross * potRate;
const total = gDasar + gross - pot;

const res = document.getElementById("hasil");
res.style.display="block";

res.innerHTML=`
<h3>HASIL BONUS</h3>
<div>Gaji: Rp ${gDasar.toLocaleString()}</div>
<div>Bonus: Rp ${gross.toLocaleString()}</div>
<div>Potongan: Rp ${pot.toLocaleString()}</div>
<hr>
<h2>Total: Rp ${total.toLocaleString()}</h2>
`;
}
</script>

</body>
</html>
